<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        #game-board {
            border: 2px solid #333;
            background-color: #222;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .score-container {
            margin-top: 10px;
            font-size: 20px;
        }

        .controls {
            margin-top: 15px;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="game-board" width="400" height="400"></canvas>
        <div class="score-container">
            <span>得分: </span><span id="score">0</span>
        </div>
        <div class="controls">
            <button id="start-btn">开始游戏</button>
            <button id="reset-btn">重置游戏</button>
        </div>
    </div>
    
    <div id="game-over">
        <h2>游戏结束!</h2>
        <p>最终得分: <span id="final-score">0</span></p>
        <button id="restart-btn">重新开始</button>
    </div>

    <script>
        // 游戏变量
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const restartBtn = document.getElementById('restart-btn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameSpeed = 120; // 毫秒
        let gameRunning = false;
        let gameLoopInterval;

        // 初始化游戏
        function initGame() {
            snake = [
                {x: 10, y: 10} // 蛇头起始位置
            ];
            
            generateFood();
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            gameSpeed = 120;
        }

        // 生成食物
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // 确保食物不生成在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    return generateFood();
                }
            }
        }

        // 绘制游戏
        function draw() {
            // 绘制背景
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线（可选）
            ctx.strokeStyle = '#333';
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    ctx.strokeRect(i * gridSize, j * gridSize, gridSize, gridSize);
                }
            }

            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                // 蛇头和其他部分使用不同颜色
                if (i === 0) {
                    ctx.fillStyle = '#4CAF50'; // 蛇头
                } else {
                    ctx.fillStyle = '#8BC34A'; // 蛇身
                }
                
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }

            // 绘制食物
            ctx.fillStyle = '#FF5252';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // 更新游戏状态
        function update() {
            // 更新方向
            direction = nextDirection;

            // 移动蛇头
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch (direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }

            // 检查碰撞边界
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查碰撞自己
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }

            // 将新头部添加到蛇
            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 增加分数
                score += 10;
                scoreElement.textContent = score;
                
                // 生成新的食物
                generateFood();
                
                // 随着分数增加，稍微提高速度
                if (gameSpeed > 60 && score % 50 === 0) {
                    gameSpeed -= 10;
                    clearInterval(gameLoopInterval);
                    gameLoopInterval = setInterval(runGame, gameSpeed);
                }
            } else {
                // 如果没有吃到食物，则移除尾部
                snake.pop();
            }
        }

        // 游戏循环
        function runGame() {
            update();
            draw();
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoopInterval);
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // 开始游戏
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gameOverScreen.style.display = 'none';
                gameLoopInterval = setInterval(runGame, gameSpeed);
            }
        }

        // 重启游戏
        function resetGame() {
            clearInterval(gameLoopInterval);
            initGame();
            draw();
            gameOverScreen.style.display = 'none';
            gameRunning = false;
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', () => {
            if (!gameRunning) {
                startGame();
            }
        });

        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', () => {
            resetGame();
            startGame();
        });

        // 初始化并绘制初始画面
        initGame();
        draw();
    </script>
</body>
</html>
